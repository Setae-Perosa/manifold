  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

const LIFTS = ["High Bar Squat", "Incline Bench", "Standing OHP", "Deficit Deadlift"];
const LIFT_SHORT = ["Squat", "Bench", "OHP", "Deadlift"];

function today() { return new Date().toLocaleDateString("en-CA"); }

function soberDays() {
  const start = new Date("2026-02-14T00:00:00");
  const now = new Date();
  now.setHours(0, 0, 0, 0);
  return Math.floor((now - start) / 86400000);
}

function mounjaroWeek() {
  const start = new Date("2026-03-03T00:00:00");
  const now = new Date();
  now.setHours(0, 0, 0, 0);
  const days = Math.floor((now - start) / 86400000);
  if (days < 0) return 1;
  return Math.floor(days / 7) + 1;
}

// ── Storage: window.storage with localStorage fallback ─────────
async function storageGet(key) {
  // Try window.storage first
  try {
    if (window.storage?.get) {
      const r = await window.storage.get(key);
      if (r?.value != null) return JSON.parse(r.value);
    }
  } catch {}
  // Fallback: localStorage
  try {
    const v = localStorage.getItem(key);
    return v ? JSON.parse(v) : null;
  } catch { return null; }
}

async function storageSet(key, value) {
  const str = JSON.stringify(value);
  // Try window.storage first
  try {
    if (window.storage?.set) {
      const r = await window.storage.set(key, str);
      if (r) return true;
    }
  } catch {}
  // Fallback: localStorage
  try {
    localStorage.setItem(key, str);
    return true;
  } catch (e) {
    console.error("storageSet failed:", key, e);
    return false;
  }
}

async function storageCheck() {
  try {
    const ok = await storageSet("manifold:healthcheck", { ok: true });
    if (!ok) return false;
    const r = await storageGet("manifold:healthcheck");
    return r?.ok === true;
  } catch { return false; }
}

// ── Main App ─────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState("dashboard");
  const [loaded, setLoaded] = useState(false);
  const [storageOk, setStorageOk] = useState(true);
  const [showExport, setShowExport] = useState(false);
  const [exportText, setExportText] = useState("");

  // Data state
  const [weights, setWeights] = useState([]);
  const [diet, setDiet] = useState({});
  const [workouts, setWorkouts] = useState([]);

  // Form state
  const [wInput, setWInput] = useState("");
  const [wDate, setWDate] = useState(today());
  const [dietForm, setDietForm] = useState({ calories: "", carbs: "", protein: "", water: "", notes: "" });
  const [dietDate, setDietDate] = useState(today());
  const [wkLift, setWkLift] = useState(0);
  const [wkSets, setWkSets] = useState([{ weight: "", reps: "" }]);
  const [wkNotes, setWkNotes] = useState("");
  const [wkDate, setWkDate] = useState(today());
  const [saveFlash, setSaveFlash] = useState("");

  // Food log state
  const [foodLog, setFoodLog] = useState([]);
  const [foodStep, setFoodStep] = useState("name"); // "name" | "macros"
  const [foodName, setFoodName] = useState("");
  const [foodAmt, setFoodAmt] = useState("");
  const [foodUnit, setFoodUnit] = useState("");
  const [foodMacros, setFoodMacros] = useState({ carbs: "", protein: "", fat: "", fibre: "" });
  const [foodTime, setFoodTime] = useState("");
  const [editingId, setEditingId] = useState(null);
  const [editingName, setEditingName] = useState("");
  const [editingAmt, setEditingAmt] = useState("");
  const [editingUnit, setEditingUnit] = useState("");
  const [editingTime, setEditingTime] = useState("");
  const [foodDb, setFoodDb] = useState([]);       // persistent food database
  const [foodDbSearch, setFoodDbSearch] = useState("");
  const [showFoodDb, setShowFoodDb] = useState(false);

  // ── Load all data on mount ──
  useEffect(() => {
    (async () => {
      const [w, d, wk, fl, fdb] = await Promise.all([
        storageGet("manifold:weights"),
        storageGet("manifold:diet"),
        storageGet("manifold:workouts"),
        storageGet("manifold:foodlog"),
        storageGet("manifold:fooddb"),
      ]);
      if (w) setWeights(w);
      else setWeights([
        { date: "2026-02-28", weight: 242 },
        { date: "2026-03-07", weight: 236.5 },
      ]);
      if (d) setDiet(d);
      if (wk) setWorkouts(wk);
      if (fl) setFoodLog(fl);
      if (fdb) setFoodDb(fdb);
      const ok = await storageCheck();
      setStorageOk(ok);
      setLoaded(true);
    })();
  }, []);

  const flash = (msg) => {
    setSaveFlash(msg);
    setTimeout(() => setSaveFlash(""), 1800);
  };

  // ── Save + state helpers ──
  const saveWeight = async () => {
    if (!wInput) return;
    const updated = [...weights.filter(w => w.date !== wDate), { date: wDate, weight: parseFloat(wInput) }]
      .sort((a, b) => a.date.localeCompare(b.date));
    setWeights(updated);
    await storageSet("manifold:weights", updated);
    setWInput("");
    flash("Weight logged ✓");
  };

  const saveDiet = async () => {
    const updated = { ...diet, [dietDate]: { ...dietForm } };
    setDiet(updated);
    await storageSet("manifold:diet", updated);
    setDietForm({ calories: "", carbs: "", protein: "", water: "", notes: "" });
    flash("Day recorded ✓");
  };

  const saveWorkout = async () => {
    const validSets = wkSets.filter(s => s.weight && s.reps);
    if (!validSets.length) return;
    const updated = [...workouts, { date: wkDate, lift: LIFTS[wkLift], sets: validSets, notes: wkNotes }];
    setWorkouts(updated);
    await storageSet("manifold:workouts", updated);
    setWkSets([{ weight: "", reps: "" }]);
    setWkNotes("");
    flash("Session recorded ✓");
  };

  const deleteWeight = async (date) => {
    const updated = weights.filter(w => w.date !== date);
    setWeights(updated);
    await storageSet("manifold:weights", updated);
    flash("Entry removed ✓");
  };

  const deleteWorkout = async (index) => {
    const reversed = [...workouts].reverse();
    const original = workouts.indexOf(reversed[index]);
    const updated = workouts.filter((_, i) => i !== original);
    setWorkouts(updated);
    await storageSet("manifold:workouts", updated);
    flash("Session removed ✓");
  };

  const deleteDiet = async (date) => {
    const updated = { ...diet };
    delete updated[date];
    setDiet(updated);
    await storageSet("manifold:diet", updated);
    flash("Day removed ✓");
  };

  // ── Food Log ──
  const nowTime = () => new Date().toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });

  const startFoodEntry = () => {
    if (!foodName.trim()) return;
    setFoodTime(nowTime());
    setFoodMacros({ carbs: "", protein: "", fat: "", fibre: "" });
    setFoodStep("macros");
  };

  const calcCals = (m, mult = 1) =>
    Math.round(((parseFloat(m.carbs)||0)*4 + (parseFloat(m.protein)||0)*4 + (parseFloat(m.fat)||0)*9) * mult);

  const scaleMacro = (val, mult) => {
    const n = parseFloat(val);
    if (!n) return "";
    return String(Math.round(n * mult * 10) / 10);
  };

  const recalcTotals = async (log, currentDiet) => {
    const d = currentDiet ?? diet;
    const todayEntries = log.filter(e => e.date === today());
    const totals = todayEntries.reduce((acc, e) => ({
      calories: acc.calories + (e.calories || 0),
      protein:  acc.protein  + (parseFloat(e.protein)  || 0),
      carbs:    acc.carbs    + (parseFloat(e.carbs)    || 0),
    }), { calories: 0, protein: 0, carbs: 0 });
    const existing = d[today()] || {};
    const dietUpdated = {
      ...d,
      [today()]: {
        ...existing,
        calories: String(Math.round(totals.calories)),
        protein:  String(Math.round(totals.protein)),
        carbs:    String(Math.round(totals.carbs)),
      }
    };
    setDiet(dietUpdated);
    await storageSet("manifold:diet", dietUpdated);
  };

  const saveFoodEntry = async () => {
    const mult = parseFloat(foodAmt) || 1;
    const scaled = {
      carbs:   scaleMacro(foodMacros.carbs,   mult),
      protein: scaleMacro(foodMacros.protein, mult),
      fat:     scaleMacro(foodMacros.fat,     mult),
      fibre:   scaleMacro(foodMacros.fibre,   mult),
    };
    const cals = calcCals(foodMacros, mult);
    const entry = {
      id: Date.now(),
      date: today(),
      time: foodTime,
      name: foodName.trim(),
      amount: parseFloat(foodAmt) || 1,
      unit: foodUnit.trim() || "serving",
      carbs: scaled.carbs,
      protein: scaled.protein,
      fat: scaled.fat,
      fibre: scaled.fibre,
      calories: cals,
    };
    const updatedLog = [...foodLog, entry];
    setFoodLog(updatedLog);
    await storageSet("manifold:foodlog", updatedLog);
    await recalcTotals(updatedLog);

    // DB stores per-unit macros so amount can scale on reuse
    const dbKey = foodName.trim().toLowerCase();
    const dbEntry = {
      name: foodName.trim(),
      unit: foodUnit.trim() || "serving",
      carbsPerUnit:   foodMacros.carbs,
      proteinPerUnit: foodMacros.protein,
      fatPerUnit:     foodMacros.fat,
      fibrePerUnit:   foodMacros.fibre,
      calsPerUnit:    calcCals(foodMacros, 1),
      lastUsed: today(),
    };
    const existingIdx = foodDb.findIndex(f => f.name.toLowerCase() === dbKey);
    let updatedDb;
    if (existingIdx >= 0) {
      updatedDb = foodDb.map((f, i) => i === existingIdx
        ? { ...f, ...dbEntry, useCount: (f.useCount || 1) + 1 }
        : f
      );
    } else {
      updatedDb = [...foodDb, { ...dbEntry, useCount: 1 }];
    }
    updatedDb.sort((a, b) => (b.lastUsed || "").localeCompare(a.lastUsed || "") || (b.useCount || 0) - (a.useCount || 0));
    setFoodDb(updatedDb);
    const saved = await storageSet("manifold:fooddb", updatedDb);

    setFoodStep("name");
    setFoodName("");
    setFoodAmt("");
    setFoodUnit("");
    setFoodMacros({ carbs: "", protein: "", fat: "", fibre: "" });
    flash(saved ? "Food logged ✓" : "⚠ Logged but save failed");
    if (!saved) setStorageOk(false);
  };

  const startEditEntry = (entry) => {
    setEditingId(entry.id);
    setEditingName(entry.name);
    setEditingAmt(String(entry.amount || 1));
    setEditingUnit(entry.unit || "serving");
    setEditingTime(entry.time);
    // Store per-unit macros for re-scaling: reverse-divide by original amount
    const origMult = parseFloat(entry.amount) || 1;
    setFoodMacros({
      carbs:   entry.carbs   ? String(Math.round((parseFloat(entry.carbs)   / origMult) * 10) / 10) : "",
      protein: entry.protein ? String(Math.round((parseFloat(entry.protein) / origMult) * 10) / 10) : "",
      fat:     entry.fat     ? String(Math.round((parseFloat(entry.fat)     / origMult) * 10) / 10) : "",
      fibre:   entry.fibre   ? String(Math.round((parseFloat(entry.fibre)   / origMult) * 10) / 10) : "",
    });
  };

  const saveEditEntry = async () => {
    const mult = parseFloat(editingAmt) || 1;
    const scaled = {
      carbs:   scaleMacro(foodMacros.carbs,   mult),
      protein: scaleMacro(foodMacros.protein, mult),
      fat:     scaleMacro(foodMacros.fat,     mult),
      fibre:   scaleMacro(foodMacros.fibre,   mult),
    };
    const updated = foodLog.map(e =>
      e.id === editingId
        ? { ...e, name: editingName || e.name, amount: parseFloat(editingAmt) || 1, unit: editingUnit || e.unit || "serving", time: editingTime || e.time, ...scaled, calories: calcCals(foodMacros, mult) }
        : e
    );
    setFoodLog(updated);
    await storageSet("manifold:foodlog", updated);
    await recalcTotals(updated);
    setEditingId(null);
    setFoodMacros({ carbs: "", protein: "", fat: "", fibre: "" });
    flash("Entry updated ✓");
  };

  const deleteFoodEntry = async (id) => {
    const updated = foodLog.filter(e => e.id !== id);
    setFoodLog(updated);
    await storageSet("manifold:foodlog", updated);
    await recalcTotals(updated);
    if (editingId === id) setEditingId(null);
    flash("Entry removed ✓");
  };

  const deleteFoodDbEntry = async (name) => {
    const updated = foodDb.filter(f => f.name.toLowerCase() !== name.toLowerCase());
    setFoodDb(updated);
    await storageSet("manifold:fooddb", updated);
    flash("Removed from database ✓");
  };

  const addWater = async (ml) => {
    const existing = diet[today()] || {};
    const current = parseFloat(existing.water) || 0;
    const updated = { ...diet, [today()]: { ...existing, water: String(Math.round(current + ml)) } };
    setDiet(updated);
    await storageSet("manifold:diet", updated);
    flash(`+${ml} ml ✓`);
  };

  const resetWater = async () => {
    const existing = diet[today()] || {};
    const updated = { ...diet, [today()]: { ...existing, water: "0" } };
    setDiet(updated);
    await storageSet("manifold:diet", updated);
    flash("Water reset ✓");
  };

  const loadFromDb = (dbEntry) => {
    setFoodName(dbEntry.name);
    setFoodAmt("1");
    setFoodUnit(dbEntry.unit || "serving");
    setFoodMacros({
      carbs:   dbEntry.carbsPerUnit   || dbEntry.carbs   || "",
      protein: dbEntry.proteinPerUnit || dbEntry.protein || "",
      fat:     dbEntry.fatPerUnit     || dbEntry.fat     || "",
      fibre:   dbEntry.fibrePerUnit   || dbEntry.fibre   || "",
    });
    setFoodTime(nowTime());
    setShowFoodDb(false);
    setFoodDbSearch("");
    setFoodStep("macros");
  };

  const todayFoodLog = foodLog.filter(e => e.date === today());
  const todayFoodTotals = todayFoodLog.reduce((acc, e) => ({
    calories: acc.calories + (e.calories || 0),
    protein:  acc.protein  + (parseFloat(e.protein)  || 0),
    carbs:    acc.carbs    + (parseFloat(e.carbs)    || 0),
    fat:      acc.fat      + (parseFloat(e.fat)      || 0),
    fibre:    acc.fibre    + (parseFloat(e.fibre)    || 0),
  }), { calories: 0, protein: 0, carbs: 0, fat: 0, fibre: 0 });

  const CAL_TARGET = 2000;
  const filteredDb = foodDb.filter(f =>
    !foodDbSearch || f.name.toLowerCase().includes(foodDbSearch.toLowerCase())
  );
    const latest = weights[weights.length - 1];
  const prevW = weights.length > 1 ? weights[weights.length - 2] : null;
  const delta = latest && prevW ? (latest.weight - prevW.weight).toFixed(1) : null;
  const todayDiet = diet[today()];
  const recentWorkouts = [...workouts].reverse().slice(0, 6);

  const generateExport = () => {
    const lines = [];
    const d = new Date();
    lines.push("═══════════════════════════════════════");
    lines.push("  THE MANIFOLD — HEALTH EXPORT");
    lines.push(`  Generated: ${d.toLocaleDateString("en-CA")} at ${d.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" })}`);
    lines.push("═══════════════════════════════════════");
    lines.push("");

    // ── Profile context ──
    lines.push("── PROFILE ─────────────────────────────");
    lines.push("Name: James  |  DOB: Feb 5 1974  |  6'2\" male");
    lines.push(`Sobriety: ${soberDays()} days (since Feb 14 2026)`);
    lines.push(`Mounjaro: Week ${mounjaroWeek()} (2.5mg, started Mar 3 2026)`);
    lines.push("A1C: 6.6 (as of Feb 27 2026)");
    lines.push("Target: A1C reduction via diet + medication");
    lines.push("");

    // ── Weight ──
    lines.push("── WEIGHT ──────────────────────────────");
    if (weights.length === 0) {
      lines.push("No weight entries logged.");
    } else {
      const sorted = [...weights].sort((a, b) => a.date.localeCompare(b.date));
      const first = sorted[0];
      const last = sorted[sorted.length - 1];
      const change = (last.weight - first.weight).toFixed(1);
      lines.push(`Current: ${last.weight} lbs (${last.date})`);
      lines.push(`Starting: ${first.weight} lbs (${first.date})`);
      lines.push(`Total change: ${change > 0 ? "+" : ""}${change} lbs`);
      lines.push("");
      lines.push("Full history:");
      sorted.forEach(w => lines.push(`  ${w.date}: ${w.weight} lbs`));
    }
    lines.push("");

    // ── Nutrition (last 14 days) ──
    lines.push("── NUTRITION (last 14 days) ────────────");
    const dietDates = Object.keys(diet).sort().reverse().slice(0, 14);
    if (dietDates.length === 0) {
      lines.push("No nutrition entries logged.");
    } else {
      dietDates.forEach(date => {
        const d = diet[date];
        const parts = [];
        if (d.calories) parts.push(`${d.calories} kcal`);
        if (d.protein)  parts.push(`${d.protein}g protein`);
        if (d.carbs)    parts.push(`${d.carbs}g carbs`);
        if (d.water)    parts.push(`${d.water} ml water`);
        lines.push(`  ${date}: ${parts.join(" · ") || "logged"}`);
        if (d.notes) lines.push(`    Notes: ${d.notes}`);
      });
    }
    lines.push("");

    // ── Food log (last 7 days) ──
    lines.push("── FOOD LOG (last 7 days) ──────────────");
    const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 7);
    const recentFood = foodLog
      .filter(e => new Date(e.date) >= cutoff)
      .sort((a, b) => b.date.localeCompare(a.date) || b.time?.localeCompare(a.time));
    if (recentFood.length === 0) {
      lines.push("No food entries in last 7 days.");
    } else {
      let lastDate = "";
      recentFood.forEach(e => {
        if (e.date !== lastDate) {
          lines.push(`  ${e.date}:`);
          lastDate = e.date;
        }
        const macros = [];
        if (e.calories) macros.push(`${e.calories} kcal`);
        if (e.protein)  macros.push(`${e.protein}g P`);
        if (e.carbs)    macros.push(`${e.carbs}g C`);
        if (e.fat)      macros.push(`${e.fat}g F`);
        lines.push(`    [${e.time || "—"}] ${e.amount} ${e.unit || ""} ${e.name} — ${macros.join(", ") || "no macros"}`);
      });
    }
    lines.push("");

    // ── Food database ──
    lines.push("── FOOD DATABASE ───────────────────────");
    if (foodDb.length === 0) {
      lines.push("No foods in database yet.");
    } else {
      foodDb.forEach(f => {
        const cals = f.calsPerUnit || f.calories || 0;
        const prot = f.proteinPerUnit || f.protein || 0;
        const carb = f.carbsPerUnit  || f.carbs  || 0;
        const fat  = f.fatPerUnit    || f.fat    || 0;
        lines.push(`  ${f.name} (per ${f.unit || "serving"}): ${cals} kcal · ${prot}g P · ${carb}g C · ${fat}g F  [used ×${f.useCount || 1}]`);
      });
    }
    lines.push("");

    // ── Training ──
    lines.push("── TRAINING ────────────────────────────");
    if (workouts.length === 0) {
      lines.push("No training sessions logged.");
    } else {
      const recent = [...workouts].sort((a, b) => b.date.localeCompare(a.date)).slice(0, 10);
      recent.forEach(w => {
        lines.push(`  ${w.date} — ${w.lift}`);
        w.sets?.forEach((s, i) => lines.push(`    Set ${i + 1}: ${s.weight} lbs × ${s.reps} reps`));
        if (w.notes) lines.push(`    Notes: ${w.notes}`);
      });
    }
    lines.push("");
    lines.push("═══════════════════════════════════════");
    lines.push("  Paste this into your Claude conversation");
    lines.push("  for analysis and insights.");
    lines.push("═══════════════════════════════════════");

    const text = lines.join("\n");
    setExportText(text);
    setShowExport(true);
  };

  const tabs = [
    { id: "dashboard", icon: "⚙", label: "Log" },
    { id: "weight", icon: "⚖", label: "Weight" },
    { id: "diet", icon: "⚗", label: "Diet" },
    { id: "food", icon: "✦", label: "Food" },
    { id: "training", icon: "⚒", label: "Train" },
  ];

  if (!loaded) return (
    <div style={{ minHeight: "100vh", background: "#e8d9b5", display: "flex", alignItems: "center", justifyContent: "center" }}>
      <div style={{ fontFamily: "'Cinzel', serif", fontSize: 22, color: "#a07840", letterSpacing: 4 }}>LOADING…</div>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&display=swap');`}</style>
    </div>
  );

  return (
    <div style={{ minHeight: "100vh", background: "#e8d9b5", color: "#1a1008", fontFamily: "'IM Fell English', serif", paddingBottom: 96 }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cinzel:wght@600;800&family=Special+Elite&display=swap');

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #e8d9b5; }

        .parchment-bg {
          background-color: #e8d9b5;
          background-image: repeating-linear-gradient(
            0deg, transparent, transparent 28px,
            rgba(160,120,64,0.06) 28px, rgba(160,120,64,0.06) 29px
          );
        }

        input, textarea, select {
          background: #f5eed8; border: 2px solid #a07840; color: #1a1008;
          font-family: 'Special Elite', monospace; font-size: 18px;
          padding: 14px 16px; outline: none; width: 100%; border-radius: 2px;
          -webkit-appearance: none; appearance: none;
          box-shadow: inset 0 1px 3px rgba(100,60,20,0.15);
        }
        input::placeholder, textarea::placeholder { color: #b09060; }
        input:focus, textarea:focus, select:focus {
          border-color: #7a4a28; background: #fdf8ec;
          box-shadow: inset 0 1px 3px rgba(100,60,20,0.2), 0 0 0 3px rgba(122,74,40,0.12);

                      <div style={{ display: "flex", gap: 8, marginLeft: 10, marginTop: 2 }}>

                    {editingId === e.id && (

                </div>
              ))}
              <button className="ghost-btn" style={{ width: "100%", marginBottom: 18 }}
                onClick={() => setWkSets(prev => [...prev, { weight: "", reps: "" }])}>
                ⊕ Add Set
              </button>
              <div className="field-group">
                <span className="lbl">Notes</span>
                <textarea placeholder="How did it feel? PRs? Adjustments?" value={wkNotes}
                  onChange={e => setWkNotes(e.target.value)} />
              </div>
              <button className="big-btn" onClick={saveWorkout}>RECORD SESSION</button>
            </div>
            <div className="card">
              <span className="lbl">Session History</span>
              {workouts.length === 0 && <div className="empty">No sessions recorded yet</div>}
              {[...workouts].reverse().map((w, i) => (
                <div key={i} className="workout-entry">
                  <div className="row">
                    <span className="lift-name">{w.lift}</span>
                    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                      <span style={{ fontFamily: "'Special Elite', monospace", fontSize: 14, color: "#9a7040" }}>
                        {new Date(w.date + "T12:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric" })}
                      </span>
                      <button className="del-btn" onClick={() => deleteWorkout(i)}>✕</button>
                    </div>
                  </div>
                  <div style={{ fontFamily: "'Special Elite', monospace", fontSize: 17, color: "#6a4a28", marginTop: 5 }}>
                    {w.sets.map((s, j) => <span key={j}>{j > 0 ? " · " : ""}<span style={{ color: "#2a1a08" }}>{s.weight}</span>×{s.reps}</span>)}
                  </div>
                  {w.notes && <div style={{ fontFamily: "'IM Fell English', serif", fontStyle: "italic", fontSize: 14, color: "#9a7040", marginTop: 6 }}>{w.notes}</div>}
                </div>
              ))}
            </div>
          </>
        )}

      </div>

      {/* BOTTOM NAV */}
      <div className="bottom-nav">
        {tabs.map(t => (
          <button key={t.id} className={`nav-item${tab === t.id ? " active" : ""}`} onClick={() => setTab(t.id)}>
            <span className="nav-icon">{t.icon}</span>
            <span className="nav-label">{t.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <script>
    // Register service worker for offline use
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        // Inline service worker via blob URL
        const swCode = `
          const CACHE = 'manifold-v1';
          const ASSETS = [location.href];
          self.addEventListener('install', e => {
            e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)));
          });
          self.addEventListener('fetch', e => {
            e.respondWith(
              caches.match(e.request).then(r => r || fetch(e.request))
            );
          });
        `;
        const blob = new Blob([swCode], { type: 'application/javascript' });
        const swUrl = URL.createObjectURL(blob);
        navigator.serviceWorker.register(swUrl).catch(() => {});
      });
    }
  </script>
